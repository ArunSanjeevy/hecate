services:
  # 1. Hecate Express Backend
  - type: web
    name: hecate-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm --prefix js-sdk ci && npm --prefix js-sdk run build
    startCommand: npm start
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: prod
      - key: NODE_VERSION
        value: "24"
      - key: DATABASE_URL
        sync: false # User will paste their Aiven PostgreSQL connection string here
      - key: REDIS_URL
        sync: false # User will paste their Upstash Redis connection string here
      - key: JWT_SECRET
        generateValue: true
      - key: API_KEY_HASH_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: hecate-api
      - key: JWT_AUDIENCE
        value: hecate-dashboard
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGINS
        sync: false # Paste the public admin dashboard URL here after creating the static site
      - key: DB_SSL_ENABLED
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: DB_CA_CERT
        sync: false # User will paste the raw content of their Aiven ca.pem certificate here

  # 2. React Admin Dashboard (Static Site)
  - type: web
    name: hecate-admin
    runtime: static
    rootDir: admin-dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # Direct all routes to index.html for React Router routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_HECATE_API_URL
        sync: false # Paste the public URL of your backend service here (e.g. https://hecate-backend.onrender.com)
