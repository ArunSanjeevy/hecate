services:
  # 1. Hecate Express Backend
  - type: web
    name: hecate-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: hecate-db
          property: connectionString
      - key: REDIS_URL
        fromConnectionString:
          type: redis
          name: hecate-cache
      - key: API_KEY
        generateValue: true # Generates a secure API key automatically

  # 2. React Admin Dashboard
  - type: web
    name: hecate-admin
    env: static
    plan: free
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Direct all routes to index.html for React Router routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_HECATE_API_URL
        fromService:
          type: web
          name: hecate-backend
          property: host

# Managed Databases
databases:
  - name: hecate-db
    plan: free

# Managed Cache
redis:
  - name: hecate-cache
    plan: free
    ipAllowList: [] # Strict VPC access only
