services:
  # 1. Hecate Express Backend
  - type: web
    name: hecate-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: prod
      - key: DATABASE_URL
        sync: false # User will paste their Aiven PostgreSQL connection string here
      - key: REDIS_URL
        sync: false # User will paste their Upstash Redis connection string here
      - key: API_KEY
        generateValue: true # Generates a secure API key automatically

  # 2. React Admin Dashboard (Static Site)
  - type: static
    name: hecate-admin
    plan: free
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Direct all routes to index.html for React Router routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_HECATE_API_URL
        fromService:
          type: web
          name: hecate-backend
          property: host
